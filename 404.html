<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Riyasad Dhafeeq</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "IBM Plex Sans", sans-serif;
      background: #04060e;
      color: #f0f4ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 24px;
    }
    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #fde68a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
    }
    p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 32px;
      max-width: 400px;
      line-height: 1.7;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #92400e, #b45309, #f59e0b);
      color: #0a0500;
      text-decoration: none;
      box-shadow: 0 4px 28px rgba(245, 158, 11, 0.32);
      transition: all 0.25s;
    }
    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(245, 158, 11, 0.48);
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>This page doesn't exist. Let's get you back on track.</p>
  <a href="/">← Back to Home</a>
</body>
</html>
